<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>shagun hegde</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #fffef9;
      --accent-yellow: #fef3a0;
      --accent-yellow-dark: #f5e44a;
      --text: #111;
      --text-muted: #555;
      --border: #e8e4d4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    .card {
      max-width: 520px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* photo */
    .photo-wrap {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: var(--accent-yellow);
      border: 3px solid var(--accent-yellow-dark);
      overflow: hidden;
      margin-bottom: 1.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .photo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .photo-placeholder {
      font-family: 'Quicksand', cursive;
      font-size: 0.8rem;
      color: #888;
      text-align: center;
      padding: 0.5rem;
      line-height: 1.4;
    }

    /* name */
    h1 {
      font-family: 'Lora', Georgia, serif;
      font-weight: 400;
      font-size: 2rem;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 0.4rem;
      text-align: center;
    }

    /* bio */
    .bio {
      font-size: 0.97rem;
      line-height: 1.75;
      color: var(--text-muted);
      text-align: center;
      max-width: 420px;
      margin-top: 0.5rem;
      margin-bottom: 2rem;
    }

    .bio a {
      color: var(--text);
      text-underline-offset: 3px;
      text-decoration-color: var(--accent-yellow-dark);
      text-decoration-thickness: 2px;
      transition: background 0.15s;
    }

    .bio a:hover {
      background: var(--accent-yellow);
      border-radius: 2px;
    }

    /* divider */
    .divider {
      width: 40px;
      height: 2px;
      background: var(--accent-yellow-dark);
      border-radius: 2px;
      margin-bottom: 1.8rem;
    }

    /* links */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.65rem;
      justify-content: center;
    }

    .link-item {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.48rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-family: 'Quicksand', cursive;
      font-size: 1.05rem;
      color: var(--text);
      text-decoration: none;
      background: #fff;
      transition: background 0.15s, border-color 0.15s, transform 0.12s;
    }

    .link-item:hover {
      background: var(--accent-yellow);
      border-color: var(--accent-yellow-dark);
      transform: translateY(-1px);
    }

    .link-item svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
      fill: currentColor;
    }

    /* blog link — slightly accented */
    .link-item.blog {
      background: var(--accent-yellow);
      border-color: var(--accent-yellow-dark);
      font-weight: 500;
    }

    .link-item.blog:hover {
      background: var(--accent-yellow-dark);
    }

    /* footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1.5rem;
      font-family: 'Quicksand', cursive;
      font-size: 0.85rem;
      color: #bbb;
    }

    /* fade-in animation */
    .card {
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .photo-wrap { animation: fadeUp 0.5s ease both; }
    h1          { animation: fadeUp 0.55s 0.05s ease both; }
    .bio        { animation: fadeUp 0.55s 0.1s  ease both; }
    .divider    { animation: fadeUp 0.55s 0.15s ease both; }
    .links      { animation: fadeUp 0.55s 0.2s  ease both; }
  </style>
</head>
<body>

    <div class="card">

      <div class="photo-wrap">

        <img src="https://github.com/shagunhegde.png" alt="shagun hegde" />

      </nav>

    </div>
  </main>

</body>
</html>
